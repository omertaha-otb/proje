<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ses 1</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 32px;
    }

    h1 {
      font-size: clamp(28px, 7vw, 42px);
    }

    audio {
      width: 100%;
      max-width: 400px;
    }

    a {
      color: #38bdf8;
      font-size: 18px;
      text-decoration: none;
      padding: 12px 28px;
      border: 1px solid #38bdf8;
      border-radius: 12px;
      transition: 0.3s;
    }

    a:hover {
      background: #38bdf8;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <h1>🔊 Wohnzimmer</h1>
  <audio autoplay controls>
    <source src="1.mp3" type="audio/mpeg">
  </audio>
  <a href="index.html">⬅ Startseite</a>
</body>
</html>
